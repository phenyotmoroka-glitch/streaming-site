<html lang="en">
  <head>
    <meta charset="UTF-8" />

  </head>
  <body>
    <main>
      <div class="navbar">
        <div class="navbar-container">
          <div class="logo-container">
           <span><a href="/index.html"> <h1 class="logo">streamly</h1></a></span>
          </div>
          <div class="menu-container">
            <ul class="menu-list">
              <li class="menu-list-item"><a href="/index.html">Home</a></li>
              <li class="menu-list-item">Browse</li>
            </ul>
          </div>


          <div class="icons">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
          



            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-icon lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>


          </div>
        </div>
      </div>


    

  


  <!-- Background grid + glow -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>


  




  <!-- Main -->
  <main class="main">
    <div class="card">
      <div class="card-inner">

        <div class="card-header">
          <h1 class="title">Sign In</h1>
          <p class="subtitle">Welcome back.</p>
        </div>

        <form class="form" onsubmit="return false;">
          <div class="field">
            <input type="email" id="email" placeholder="Email address " />
            <label for="email">Email address</label>
            <span class="field-line"></span>
          </div>

          <div class="field">
            <input type="password" id="password" placeholder="Password "/>
            <label for="password">Password</label>
            <span class="field-line"></span>
          </div>

          <button type="submit" class="btn-signin">
            <span class="btn-text">Sign In</span>
            <span class="btn-glow"></span>
          </button>

          <div class="form-footer">
            <label class="remember">
              <input type="checkbox" />
              <span class="checkmark"></span>
              <span>Remember me</span>
            </label>
            <a href="#" class="link">Forgot password?</a>
          </div>
        </form>

        <div class="divider"><span>or</span></div>

        <p class="signup-line">
          New to Streamly? <a href="accountCreate.html" class="link accent">Sign up now</a>.
        </p>

        
        

      </div>
    </div>
  </main>
