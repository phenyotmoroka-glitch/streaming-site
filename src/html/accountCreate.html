<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Streamly – Create Account</title>
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" href="../css/accountCreate.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
  <div class="navbar-container">
    <div class="logo-container">
      <a href="/index.html"><h1 class="logo">streamly</h1></a>
    </div>
    <div class="menu-container">
      <ul class="menu-list">
        <li class="menu-list-item"><a href="/index.html">Home</a></li>
        <li class="menu-list-item browse-item" id="browseItem">
  Browse
  <div class="browse-dropdown">
    <a href="/src/html/series.html">Series</a>
    <a href="/src/html/films.html">Films</a>
  </div>
</li>
      </ul>
    </div>
    <div class="icons">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
      <div class="profile-icon" id="profileIcon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <div class="profile-dropdown">
          <a href="/src/html/login.html">Login</a>
          <a href="/src/html/accountCreate.html">Create Account</a>
        </div>
      </div>
    </div>
  </div>
</nav>

  <!-- Main -->
  <main class="main">
    <div class="card">
      <div class="card-inner">

        <div class="card-header">
          <h1 class="title">Create Account</h1>
          <p class="subtitle">Join Streamly and start watching today.</p>
        </div>

        <form class="form" onsubmit="return false;">

          <!-- Name row -->
          <div class="field-row">
            <div class="field">
              <input type="text" id="firstname" placeholder="First name" autocomplete="given-name" />
            </div>
            <div class="field">
              <input type="text" id="lastname" placeholder="Last name" autocomplete="family-name" />
            </div>
          </div>

          <div class="field">
            <input type="email" id="email" placeholder="Email address" autocomplete="email" />
          </div>

          <div class="field">
            <input type="password" id="password" placeholder="Password" autocomplete="new-password" />
          </div>

          <div class="field">
            <input type="password" id="confirm-password" placeholder="Confirm password" autocomplete="new-password" />
          </div>

          <!-- Plan selector -->
          <div class="plan-group">
            <p class="plan-label">Choose a plan</p>
            <div class="plan-options">

              <label class="plan-card">
                <input type="radio" name="plan" value="basic" />
                <div class="plan-content">
                  <span class="plan-name">Basic</span>
                  <span class="plan-price">Free</span>
                  <span class="plan-desc">SD quality · 1 screen</span>
                </div>
              </label>

              <label class="plan-card">
                <input type="radio" name="plan" value="standard" checked />
                <div class="plan-content">
                  <span class="plan-name">Standard</span>
                  <span class="plan-price">P9.99<span class="plan-per">/mo</span></span>
                  <span class="plan-desc">HD quality · 2 screens</span>
                </div>
              </label>

              <label class="plan-card">
                <input type="radio" name="plan" value="premium" />
                <div class="plan-content">
                  <span class="plan-name">Premium</span>
                  <span class="plan-price">P15.99<span class="plan-per">/mo</span></span>
                  <span class="plan-desc">4K quality · 4 screens</span>
                </div>
              </label>

            </div>
          </div>

          <!-- Terms -->
          <label class="remember">
            <input type="checkbox" id="terms" />
            <span class="checkmark"></span>
            <span>I agree to the <a href="#" class="link accent">Terms of Service</a> and <a href="#" class="link accent">Privacy Policy</a></span>
          </label>

          <button type="submit" class="btn-signin">
            Create Account
          </button>

        </form>

        <div class="divider"><span>or</span></div>

        <p class="signup-line">
          Already have an account? <a href="login.html" class="link accent">Sign in</a>.
        </p>

      </div>
    </div>
  </main>

</footer>

</body>

</html>
